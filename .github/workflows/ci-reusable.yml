# ci-reusable.yml
#
# Callable workflow: typecheck, production build, unit tests, and optional DB
# integration. Used by ci.yml (PRs + non-main branches) and deploy.yml (main).
#
# Integration needs Supabase credentials. If those live in a GitHub Environment
# (e.g. Production), this job must set `environment` so they appear in `secrets`.
# Fork PRs skip integration (run-integration: false).

name: CI (reusable)

on:
  workflow_call:
    inputs:
      run-integration:
        description: Whether to run DB integration tests
        type: boolean
        required: true

permissions:
  contents: read
  deployments: write

jobs:
  fast-checks:
    name: Type check, build, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Scripts that import App Router modules may load lib/db/client.ts, which calls getEnv() at module load.
    # Keep these set for every step so Zod never sees missing NEXT_PUBLIC_SUPABASE_* keys.
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Pin npm version
        run: npm install --global npm@11.6.1
      - name: Install dependencies
        run: |
          npm --version
          node --version
          npm ci || npm ci --legacy-peer-deps
      - name: Dedup key semantics are unit-tested in ci:fast
        run: echo "DB-backed dedup integration scripts run only in the integration job."
      - run: npx playwright install --with-deps chromium
      - run: npm run ci:fast

  integration:
    name: DB integration tests
    if: inputs.run-integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production
    # Same as fast-checks: any script importing lib/db/client needs full Supabase env at parse time.
    # Add these to the Production environment (or repository secrets) so they are never undefined.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Pin npm version
        run: npm install --global npm@11.6.1
      - name: Install dependencies
        run: |
          npm --version
          node --version
          npm ci || npm ci --legacy-peer-deps
      - run: npm run ci:integration
