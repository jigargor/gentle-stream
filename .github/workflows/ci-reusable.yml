# ci-reusable.yml
#
# Callable workflow: typecheck, production build, unit tests, and optional DB
# integration. Used by ci.yml (PRs + non-main branches) and deploy.yml (main).
#
# Integration needs Supabase credentials. If those live in a GitHub Environment
# (e.g. Production), this job must set `environment` so they appear in `secrets`.
# Fork PRs skip integration (run-integration: false).

name: CI (reusable)

on:
  workflow_call:
    inputs:
      run-integration:
        description: Whether to run DB integration tests
        type: boolean
        required: true

permissions:
  contents: read
  deployments: write

jobs:
  fast-checks:
    name: Type check, build, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Scripts that import App Router modules may load lib/db/client.ts, which calls getEnv() at module load.
    # Keep these set for every step so Zod never sees missing NEXT_PUBLIC_SUPABASE_* keys.
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Pin npm version
        run: npm install --global npm@10.8.2
      - name: Install dependencies
        run: |
          npm --version
          node --version
          npm ci || npm ci --legacy-peer-deps
      - run: npm run env:check
      - run: npm run security:inventory
      - run: npm run security:rls-audit
      - run: npm run validation:route-json-casts
      - run: npm run security:audit
        continue-on-error: true
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          ANTHROPIC_API_KEY: "placeholder-anthropic-key"
          CRON_SECRET: "placeholder-cron-secret"
      - run: npx tsx scripts/test-sudoku.ts
      - run: npx tsx scripts/test-word-search.ts
      - run: npx tsx scripts/test-killer-nonogram.ts
      - run: npx tsx scripts/test-citations.ts
      - run: npx tsx scripts/test-article-engagement-api.ts
      - run: npx tsx scripts/test-recommendation-ranking.ts
      - run: npx tsx scripts/test-engagement-guardrails.ts
        env:
          # engagement-health/route imports db; job-level placeholders cover Supabase keys.
          CRON_SECRET: "placeholder-cron-secret"
      - run: npm run test:unit
      - run: npm run test:component
      - run: npm run test:stories
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:smoke
      - run: npm run test:integration

  integration:
    name: DB integration tests
    if: inputs.run-integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: Production
    # Same as fast-checks: any script importing lib/db/client needs full Supabase env at parse time.
    # Add these to the Production environment (or repository secrets) so they are never undefined.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Pin npm version
        run: npm install --global npm@10.8.2
      - name: Install dependencies
        run: |
          npm --version
          node --version
          npm ci || npm ci --legacy-peer-deps
      - run: npx tsx scripts/test-dedup.ts
      - run: npx tsx scripts/test-url-dedup.ts
      - run: npx tsx scripts/test-article-engagement-db.ts
      - run: npx tsx scripts/test-recommendation-e2e.ts
