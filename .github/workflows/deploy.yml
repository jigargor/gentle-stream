# deploy.yml
#
# Production deploy path: push to `main` only (includes merging a PR into main).
# Vercel Git auto-deploy is off in vercel.json (`git.deploymentEnabled: false`)
# so previews and duplicate prod builds from the Vercel GitHub app do not run;
# this workflow is the only trigger for `vercel deploy --prod`.
#
# Setup required (one-time):
#   1. Install Vercel CLI: npm i -g vercel
#   2. Link project: vercel link
#   3. Get your token: vercel token create ci-deploy
#   4. Add to GitHub secrets:
#        VERCEL_TOKEN         — from step 3
#        VERCEL_ORG_ID        — from .vercel/project.json after linking
#        VERCEL_PROJECT_ID    — from .vercel/project.json after linking
#        ANTHROPIC_API_KEY    — your Anthropic key
#        NEXT_PUBLIC_SUPABASE_URL
#        SUPABASE_SERVICE_ROLE_KEY
#        NEXT_PUBLIC_SUPABASE_ANON_KEY
#        CRON_SECRET
#        VERCEL_AUTOMATION_BYPASS_SECRET — optional; required if Deployment Protection is enabled

name: deploy

on:
  push:
    branches: [main]
  # Use when you need a production deploy without a new commit (e.g. after fixing secrets).
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  quality:
    # Repo-qualified ref so GitHub Actions tooling can resolve the callee (local `./…` is valid on
    # runners but many editors report "Unable to find reusable workflow"). Pin to default branch.
    uses: jigargor/gentle-stream/.github/workflows/ci-reusable.yml@main
    secrets: inherit
    with:
      run-integration: true

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality]
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
      - name: Pin npm version
        run: npm install --global npm@11.6.1

      - name: Install dependencies
        run: |
          npm --version
          node --version
          npm ci || npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke test — GET /login
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.url }}"
          echo "Testing $DEPLOY_URL/login"
          BYPASS="${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}"
          curl_status () {
            local url="$1"
            if [ -n "$BYPASS" ]; then
              curl -s -o /dev/null -w "%{http_code}" \
                -H "x-vercel-protection-bypass: $BYPASS" \
                "$url"
            else
              curl -s -o /dev/null -w "%{http_code}" \
                "$url"
            fi
          }

          STATUS=$(curl_status "$DEPLOY_URL/login")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed — /login returned $STATUS"
            if [ "$STATUS" = "401" ] && [ -z "$BYPASS" ]; then
              echo "Hint: this often means Vercel Deployment Protection is enabled."
              echo "Add a project bypass secret and set GitHub secret VERCEL_AUTOMATION_BYPASS_SECRET."
            fi
            exit 1
          fi
          echo "Smoke test passed"

      - name: Smoke test — GET /
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.url }}"
          BYPASS="${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}"
          curl_status () {
            local url="$1"
            if [ -n "$BYPASS" ]; then
              curl -s -o /dev/null -w "%{http_code}" \
                -H "x-vercel-protection-bypass: $BYPASS" \
                "$url"
            else
              curl -s -o /dev/null -w "%{http_code}" \
                "$url"
            fi
          }

          STATUS=$(curl_status "$DEPLOY_URL/")
          echo "HTTP status: $STATUS"
          # '/' may render directly (200) or redirect to /login (307/308)
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ] && [ "$STATUS" != "308" ]; then
            echo "Smoke test failed — / returned $STATUS"
            if [ "$STATUS" = "401" ] && [ -z "$BYPASS" ]; then
              echo "Hint: this often means Vercel Deployment Protection is enabled."
              echo "Add a project bypass secret and set GitHub secret VERCEL_AUTOMATION_BYPASS_SECRET."
            fi
            exit 1
          fi
          echo "Smoke test passed"
