name: E2E nightly full suite

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Frontend quality suites
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"
      AUTH_DISABLED: "1"
      DEV_USER_ID: "nightly-e2e-user"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Pin npm version
        run: npm install --global npm@10.8.2
      - name: Install dependencies
        run: |
          npm --version
          node --version
          npm ci || npm ci --legacy-peer-deps
      - name: Run unit/component/storybook suites
        run: |
          npm run test:unit
          npm run test:component
          npm run test:stories

  e2e-full-matrix:
    name: Playwright full matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [frontend-quality]
    env:
      NEXT_PUBLIC_SUPABASE_URL: "https://placeholder.supabase.co"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "placeholder-anon-key"
      SUPABASE_SERVICE_ROLE_KEY: "placeholder-service-role-key"
      AUTH_DISABLED: "1"
      DEV_USER_ID: "nightly-e2e-user"
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Pin npm version
        run: npm install --global npm@10.8.2
      - name: Install dependencies
        run: |
          npm --version
          node --version
          npm ci || npm ci --legacy-peer-deps
      - name: Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run Playwright full suite
        run: npx playwright test --project=${{ matrix.browser }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-nightly-report-${{ matrix.browser }}
          path: |
            playwright-report
            test-results
