name: Security Weekly

on:
  schedule:
    - cron: "15 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run security:inventory
      - run: npm run security:rls-audit
      - run: npm run security:audit
        continue-on-error: true
