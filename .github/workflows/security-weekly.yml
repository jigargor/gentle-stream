name: Security Weekly

on:
  schedule:
    - cron: "15 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Pin npm version
        run: npm install --global npm@10.8.2
      - name: Install dependencies
        run: |
          npm --version
          node --version
          npm ci || npm ci --legacy-peer-deps
      - run: npm run security:inventory
      - run: npm run security:rls-audit
      - run: npm run security:audit
        continue-on-error: true
